name: Atualizar M1lhão automaticamente

# horario: inverno

on:
  schedule:
    # Todas as sextas-feiras
    # Antes: 21:00 -> Agora: 21:30
    - cron: "30 21 * * 5"
    # Antes: 22:00 -> Agora: 22:30
    - cron: "30 22 * * 5"
    # Antes: 23:00 -> Agora: 23:30
    - cron: "30 23 * * 5"

    # Backup no sábado
    # Antes: 10:00 -> Agora: 10:30
    - cron: "30 10 * * 6"
    
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências Python
        run: |
          pip install selenium chromedriver-autoinstaller

      - name: Rodar script de scraping
        run: python scripts/atualizar_milhao_sc.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          git add logs/
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática M1lhão"
            git push
          else
            echo "Nenhuma alteração, nada para commitar."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
