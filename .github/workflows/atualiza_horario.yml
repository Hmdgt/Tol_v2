name: Atualiza Horário Verão/Inverno

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-ymls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull com rebase
        run: |
          git fetch origin main
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Executar script de atualização
        run: python scripts/atualiza_yml.py

      - name: Verificar PAT_WORKFLOW
        run: |
          if [ -z "${{ secrets.PAT_WORKFLOW }}" ]; then
            echo "❌ PAT_WORKFLOW não definido. O push falhará."
            exit 1
          else
            echo "✅ PAT_WORKFLOW definido (${#{{ secrets.PAT_WORKFLOW }}} caracteres)"
          fi

      - name: Commit mudanças
        env:
          TOKEN: ${{ secrets.PAT_WORKFLOW }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/

          if ! git diff --cached --quiet; then
            git commit -m "Atualizar horários (verão/inverno) [skip ci]"

            # Push direto usando o PAT (sem depender do remote 'origin')
            git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }} HEAD:main
          else
            echo "Sem alterações"
          fi
