# horario: verao
name: Marcar imagens antigas para apagar
jobs:
  rename_old_folders:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Renomear pastas mensais com mais de 60 dias (uploads/processadas e thumbnails)
      run: "cutoff=$(date -d \"60 days ago\" +%s)\nfor base_dir in \"uploads/processadas\"\
        \ \"thumbnails\"; do\n  if [ -d \"$base_dir\" ]; then\n    find \"$base_dir\"\
        \ -maxdepth 1 -type d -name \"????-??\" | while read dir; do\n      dirname=$(basename\
        \ \"$dir\")\n      year=${dirname:0:4}\n      month=${dirname:5:2}\n     \
        \ folder_date=$(date -d \"${year}-${month}-01\" +%s)\n      if [ \"$folder_date\"\
        \ -lt \"$cutoff\" ]; then\n        echo \"\U0001F504 Renomeando $dir -> ${dir}_old\"\
        \n        mv \"$dir\" \"${dir}_old\"\n      fi\n    done\n  fi\ndone\n"
    - name: Commit das renomeações
      run: "git config user.name \"Bot Limpeza\"\ngit config user.email \"bot@github.com\"\
        \ngit add uploads/processadas/ thumbnails/\nif ! git diff --cached --quiet;\
        \ then\n  git commit -m \"Marcar imagens antigas para apagar (renomeadas _old)\"\
        \n  git push origin main\nelse\n  echo \"Nenhuma pasta antiga encontrada.\"\
        \nfi\n"
'on':
  schedule:
  - cron: 0 1 * * 0
  workflow_dispatch: null
