name: Enviar Web Push

on:
  workflow_dispatch:
    inputs:
      tipo:
        required: true
        description: "resultados ou validacao"
        type: choice
        options:
          - resultados
          - validacao
      jogo:
        required: true
        description: "Nome do jogo"
        type: string

permissions:
  contents: write  # ← ALTERADO: necessário para remover subscription.json expirada

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install web-push --no-audit --no-fund

      - name: Obter Subscription do GitHub
        id: subscription
        run: |
          HTTP_CODE=$(curl -s -o subscription_response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/subscription.json")
          
          if [ "$HTTP_CODE" -eq 404 ]; then
            echo "⚠️ Ficheiro subscription.json não encontrado. Nenhuma subscrição ativa."
            echo "vazio=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Erro HTTP $HTTP_CODE ao buscar subscription.json"
            exit 1
          fi
          
          # Guardar SHA para possível remoção
          SHA=$(jq -r '.sha' subscription_response.json)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          
          jq -r '.content' subscription_response.json | base64 -d > subscription.json
          
          if [ ! -s subscription.json ]; then
            echo "vazio=true" >> $GITHUB_OUTPUT
          else
            echo "vazio=false" >> $GITHUB_OUTPUT
          fi

      - name: Enviar Web Push
        id: send_push
        if: steps.subscription.outputs.vazio != 'true'
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          TIPO: ${{ github.event.inputs.tipo }}
          JOGO: ${{ github.event.inputs.jogo }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const webpush = require("web-push");

          const vapidPublic = process.env.VAPID_PUBLIC;
          const vapidPrivate = process.env.VAPID_PRIVATE;
          const vapidEmail = process.env.VAPID_EMAIL;

          if (!vapidPublic || !vapidPrivate || !vapidEmail) {
            console.error("❌ VAPID não configurados");
            process.exit(1);
          }

          webpush.setVapidDetails(
            `mailto:${vapidEmail}`,
            vapidPublic,
            vapidPrivate
          );

          let subscriptions = [];
          try {
            const content = fs.readFileSync("subscription.json", "utf8");
            const data = JSON.parse(content);
            subscriptions = Array.isArray(data) ? data : [data];
          } catch (err) {
            console.error("❌ Erro ao ler subscription.json:", err.message);
            process.exit(1);
          }

          if (subscriptions.length === 0) {
            console.log("⚠️ Nenhuma subscrição encontrada");
            process.exit(0);
          }

          const tipo = process.env.TIPO;
          const jogo = process.env.JOGO;

          let title = "", body = "", tag = "";
          if (tipo === "resultados") {
            title = `${jogo} - Novos resultados!`;
            body = "Já saíram os resultados. Vê na app!";
            tag = `resultado-${jogo}`;
          } else if (tipo === "validacao") {
            title = `${jogo} - Validação pendente`;
            body = "Tens boletins para validar. Verifica na app!";
            tag = `validacao-${jogo}`;
          } else {
            console.error(`❌ Tipo inválido: ${tipo}`);
            process.exit(1);
          }

          const payload = JSON.stringify({
            title, body, tag,
            icon: "/Tol_v2/icons/icon-192.png",
            badge: "/Tol_v2/icons/icon-192.png",
            url: "/Tol_v2/",
            timestamp: new Date().toISOString()
          });

          console.log(`📤 A enviar para ${subscriptions.length} subscription(s)...`);

          let expirada = false;
          
          for (let i = 0; i < subscriptions.length; i++) {
            try {
              await webpush.sendNotification(subscriptions[i], payload);
              console.log(`✅ Subscription ${i + 1} enviada`);
            } catch (err) {
              if (err.statusCode === 410) {
                console.log(`⚠️ Subscription ${i + 1} expirada (410)`);
                expirada = true;
              } else {
                console.log(`❌ Subscription ${i + 1} erro: ${err.message}`);
              }
            }
          }
          
          // Sinalizar que a subscrição expirou
          if (expirada) {
            console.log("📢 Subscrição expirada detectada");
            fs.writeFileSync("/tmp/subscription_expirada", "true");
          }
          EOF
          
          # Verificar se precisa remover subscription.json
          if [ -f "/tmp/subscription_expirada" ]; then
            echo "expirada=true" >> $GITHUB_OUTPUT
          fi

      - name: Remover subscription.json (expirada)
        if: steps.send_push.outputs.expirada == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.subscription.outputs.sha }}
        run: |
          curl -X DELETE \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/subscription.json?sha=$SHA"
          
          echo "🗑️ subscription.json removido (subscrição expirada)"
