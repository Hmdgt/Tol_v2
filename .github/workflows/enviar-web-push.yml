name: Enviar Web Push

on:
  workflow_dispatch:
    inputs:
      tipo:
        required: true
      jogo:
        required: true

permissions:
  contents: read
  actions: write   # ← essencial

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          npm init -y
          npm install web-push

      - name: Enviar notificação Web Push
        env:
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          TIPO: ${{ github.event.inputs.tipo }}
          JOGO: ${{ github.event.inputs.jogo }}
        run: |
          node << 'EOF'
          const fs = require("fs");
          const webpush = require("web-push");

          webpush.setVapidDetails(
            "mailto:teuemail@example.com",
            process.env.VAPID_PUBLIC,
            process.env.VAPID_PRIVATE
          );

          if (!fs.existsSync("subscription.json")) {
            console.log("⚠️ Sem subscription.json");
            process.exit(0);
          }

          const sub = JSON.parse(fs.readFileSync("subscription.json", "utf8"));
          
          const tipo = process.env.TIPO;
          const jogo = process.env.JOGO;
          
          let title = "", body = "";
          
          if (tipo === "resultados") {
            title = `${jogo} - Novos resultados`;
            body = "Já saíram os resultados! Consulta na app.";
          } else {
            title = `${jogo} - Validação pendente`;
            body = "Tens boletins por validar. Verifica na app.";
          }
          
          const payload = JSON.stringify({ title, body });
          
          webpush.sendNotification(sub, payload)
            .then(() => console.log("✅ Push enviada"))
            .catch(err => {
              console.error("❌ Erro:", err);
              if (err.statusCode === 410) {
                console.log("Subscription expirada, a remover ficheiro...");
                fs.unlinkSync("subscription.json");
              }
            });
          EOF
