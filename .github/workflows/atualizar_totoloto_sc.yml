# horario: verao
name: Atualizar Totoloto SC automaticamente

on:
  schedule:
    # Quarta-feira (21h, 22h, 23h PT → 20h, 21h, 22h UTC)
    - cron: "0 20 * * 3"
    - cron: "0 21 * * 3"
    - cron: "0 22 * * 3"
    - cron: "0 9 * * 4"    # backup quinta 10h PT → 9h UTC

    # Sábado (21h, 22h, 23h PT → 20h, 21h, 22h UTC)
    - cron: "0 20 * * 6"
    - cron: "0 21 * * 6"
    - cron: "0 22 * * 6"
    - cron: "0 9 * * 0"    # backup domingo 10h PT → 9h UTC

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Instalar dependências Python
        run: |
          pip install selenium chromedriver-autoinstaller

      - name: Rodar script de scraping
        run: python scripts/atualizar_totoloto_sc.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/
          git add logs/totoloto_sc_log.txt
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática Totoloto SC"
            git push
          else
            echo "Nenhuma alteração, nada para commitar."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
