# horario: verao
name: Atualizar EuroMilhões automaticamente
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Instalar Chrome
      uses: browser-actions/setup-chrome@v1
    - name: Instalar dependências Python
      run: 'pip install selenium chromedriver-autoinstaller

        '
    - name: Rodar script de scraping
      run: python scripts/atualizar_euromilhoes_sc.py
    - name: Commit e push das alterações
      run: "git config user.name \"github-actions[bot]\"\ngit config user.email \"\
        github-actions[bot]@users.noreply.github.com\"\ngit add dados/\ngit add logs/\n\
        if ! git diff --cached --quiet; then\n  git commit -m \"Atualização automática\
        \ EuroMilhões\"\n  git push\nelse\n  echo \"Nenhuma alteração, nada para commitar.\"\
        \nfi\n"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
'on':
  schedule:
 schedule:
  - cron: "0 20 * * 2"
  - cron: "0 21 * * 2"
  - cron: "0 22 * * 2"
  - cron: "0 10 * * 3"   # backup quarta
  - cron: "0 20 * * 5"
  - cron: "0 21 * * 5"
  - cron: "0 22 * * 5"
  - cron: "0 10 * * 6"   # backup sábado
  workflow_dispatch: null
