name: Detetar Novos Resultados

on:
  push:
    paths:
      - 'resultados/*_recentes.json'
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Verificar Totoloto"
      - "Verificar M1lhão"
      - "Verificar Euromilhões"
      - "Verificar EuroDreams"
    types:
      - completed

concurrency:
  group: notifications-gate
  cancel-in-progress: false

jobs:
  gerar-notificacoes:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install Pillow requests pywebpush

      # 1. Verificar validações pendentes (pode enviar push se houver novas)
      - name: Verificar validações pendentes
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.EMAIL_REMETENTE }}
        run: python scripts/verificar_validacoes_pendentes.py

      # 2. Gerar notificações de resultados (envia push para resultados novos)
      - name: Gerar notificações ativas
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.EMAIL_REMETENTE }}
        run: python scripts/gerar_notificacoes.py

      # 3. Commit de tudo (notificações + estado de validações)
      - name: Guardar alterações
        run: |
          git config --global user.name "Bot Notificações"
          git config --global user.email "bot@github.com"
          git config --global pull.rebase true

          git stash
          n=0
          until [ "$n" -ge 5 ]; do
             git pull origin main && break
             n=$((n+1))
             sleep 20
          done
          git stash pop || echo "Sem stash"

          git add resultados/notificacoes_*.json
          git add apostas/estado_validacoes.json

          if ! git diff --cached --quiet; then
            git commit -m "Notificações e estado de validações $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
