name: Processamento OCR - Santa Casa

on:
  push:
    paths:
      - 'uploads/**'
  workflow_dispatch:

jobs:
  ocr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install google-genai Pillow opencv-python-headless pywebpush

      - name: Executar OCR com Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/processar_uploads.py

      - name: Guardar alterações (OCR)
        run: |
          git config --global user.name "Bot OCR"
          git config --global user.email "bot@github.com"
          mkdir -p apostas thumbnails
          git add apostas/*.json thumbnails/
          git commit -m "OCR: Atualização de dados e registos de processamento [skip ci]" || exit 0
          git push

      # 🔔 NOVO STEP: Verificar validações pendentes e enviar push
      - name: Verificar validações pendentes e enviar push
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE }}
          VAPID_EMAIL: ${{ secrets.EMAIL_REMETENTE }}
        run: python scripts/verificar_validacoes_pendentes.py

      - name: Commit do estado de validações
        run: |
          git add apostas/estado_validacoes.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza estado de validações pós-OCR [skip ci]"
            git push
          fi

      - name: Limpar imagens processadas
        run: |
          echo "🧹 A apagar imagens processadas..."
          git rm -f uploads/*.jpg uploads/*.jpeg uploads/*.png || true
          git commit -m "Limpeza de uploads processados [skip ci]" || echo "Nada para limpar"
          git push
