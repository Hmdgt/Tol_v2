name: Atualizar Estatísticas

on:
  workflow_run:
    workflows: ["Detetar Novos Resultados"]
    types:
      - completed
  workflow_dispatch:

jobs:
  gerar-estatisticas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar script de estatísticas
        run: python scripts/gerar_estatisticas_completas.py

      - name: Commit e push das alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados/estatisticas_completas.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualização automática de estatísticas"
            git push
          else
            echo "Nenhuma alteração nas estatísticas."
          fi
